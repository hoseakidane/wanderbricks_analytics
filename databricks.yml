bundle:
  name: wanderbricks-analytics
  databricks_cli_version: ">=0.218.0"

include:
  - "resources/*.yml"

variables:
  catalog:
    description: "Unity Catalog catalog name"
    default: "hk_catalog"
  schema:
    description: "Schema for pipeline output"
    default: "default"
  notification_email:
    description: "Email for job failure alerts"
    default: "hosea.kidane@databricks.com"
  lakebase_capacity:
    description: "Lakebase instance capacity unit"
    default: "CU_1"

workspace:
  host: https://fe-sandbox-serverless-j45hcq.cloud.databricks.com

permissions:
  - user_name: hosea.kidane@databricks.com
    level: CAN_MANAGE
  - service_principal_name: hk-sp-for-cicd
    level: CAN_MANAGE
  - level: CAN_VIEW
    group_name: users

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: DEFAULT
    variables:
      catalog: hk_catalog
      schema: default
      lakebase_capacity: CU_1

  prod:
    mode: production
    workspace:
      host: https://fe-sandbox-serverless-sandbox-n841w3.cloud.databricks.com/
      root_path: /Shared/.bundle/prod/${bundle.name}
    run_as:
      service_principal_name: hk-sp-for-cicd
    variables:
      catalog: hk_catalog
      schema: default
      notification_email: hosea.kidane@databricks.com
      lakebase_capacity: CU_2
    presets:
      trigger_pause_status: UNPAUSED
