resources:
  jobs:
    wanderbricks-workflow:
      name: "[${bundle.target}] WanderBricks Analytics Workflow"

      tasks:
        - task_key: generate-clickstream-data
          notebook_task:
            notebook_path: ../src/notebooks/click_stream_data_gen.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              clickstream_table_name: ${var.clickstream_table_name}
          environment_key: default

        - task_key: run-etl-pipeline
          depends_on:
            - task_key: generate-clickstream-data
          pipeline_task:
            pipeline_id: ${resources.pipelines.wanderbricks-etl-pipeline.id}

        - task_key: sync-to-lakebase
          depends_on:
            - task_key: run-etl-pipeline
          notebook_task:
            notebook_path: ../src/notebooks/sync_to_lakebase.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              lakebase_capacity: ${var.lakebase_capacity}
              lakebase_catalog: ${var.lakebase_catalog}
              lakebase_instance_name: ${var.lakebase_instance_name}
              lakebase_schema: ${var.lakebase_schema}
              lakebase_database_name: ${var.lakebase_database_name}
              storage_schema: ${var.storage_schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"

      email_notifications:
        on_failure:
          - ${var.notification_email}
